<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加古川の天気予報集約</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .chart-wrapper {
      position: relative;
      height: 400px;
      margin-top: 30px;
    }
    .status {
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
      font-size: 14px;
    }
    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
    }
    .status.success {
      background: #e8f5e9;
      color: #388e3c;
    }
    .status.error {
      background: #ffebee;
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>加古川の天気予報集約</h1>
    <p class="subtitle">ウェザーニュース - 時間別降水量（mm）</p>
    
    <div id="status" class="status loading">読み込み中...</div>
    
    <div class="chart-wrapper">
      <canvas id="myChart"></canvas>
    </div>
  </div>

  <script>
    const FIREBASE_DB_URL = 'https://tenki-makaki-default-rtdb.firebaseio.com';
    let chart = null;

    async function fetchWeatherData() {
      try {
        const statusEl = document.getElementById('status');
        statusEl.className = 'status loading';
        statusEl.textContent = '天気データを取得中...';

        // Firebase から最新24時間のデータを取得
        const url = `${FIREBASE_DB_URL}/weather/weathernews.json`;
        const response = await fetch(url);
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        
        if (!data) {
          statusEl.className = 'status error';
          statusEl.textContent = 'データが見つかりません';
          return;
        }

        // データを時系列で整形
        const chartData = [];
        Object.entries(data).forEach(([date, hourData]) => {
          Object.entries(hourData || {}).forEach(([hour, values]) => {
            chartData.push({
              time: `${date} ${hour}:00`,
              latest: values.latest || 0,
              '1h前': values['1h_ago'] || 0,
              '2h前': values['2h_ago'] || 0
            });
          });
        });

        // 時系列でソート
        chartData.sort((a, b) => new Date(a.time) - new Date(b.time));
        
        // 最新24時間のみ
        const displayData = chartData.slice(-24);

        if (displayData.length === 0) {
          statusEl.className = 'status error';
          statusEl.textContent = 'グラフに表示するデータがありません';
          return;
        }

        // グラフ描画
        drawChart(displayData);

        statusEl.className = 'status success';
        statusEl.textContent = `✅ 最新更新: ${new Date().toLocaleString('ja-JP')} (${displayData.length}時間分のデータ)`;
      } catch (error) {
        const statusEl = document.getElementById('status');
        statusEl.className = 'status error';
        statusEl.textContent = `❌ エラー: ${error.message}`;
        console.error('Error:', error);
      }
    }

    function drawChart(data) {
      const ctx = document.getElementById('myChart').getContext('2d');
      
      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map(d => d.time.split(' ')[1]),
          datasets: [
            {
              label: '現在',
              data: data.map(d => d.latest),
              borderColor: '#ff6b6b',
              backgroundColor: 'rgba(255, 107, 107, 0.1)',
              tension: 0.4,
              borderWidth: 2,
              pointRadius: 4
            },
            {
              label: '1時間前',
              data: data.map(d => d['1h前']),
              borderColor: '#4ecdc4',
              backgroundColor: 'rgba(78, 205, 196, 0.1)',
              tension: 0.4,
              borderWidth: 2,
              pointRadius: 4
            },
            {
              label: '2時間前',
              data: data.map(d => d['2h前']),
              borderColor: '#95e1d3',
              backgroundColor: 'rgba(149, 225, 211, 0.1)',
              tension: 0.4,
              borderWidth: 2,
              pointRadius: 4
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
            },
            title: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              title: {
                display: true,
                text: '降水量（mm）'
              }
            },
            x: {
              title: {
                display: true,
                text: '時刻'
              }
            }
          }
        }
      });
    }

    // ページ読み込み時とその後毎分リロード
    fetchWeatherData();
    setInterval(fetchWeatherData, 60000);  // 1分ごとに更新
  </script>
</body>
</html>
